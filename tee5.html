<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Focura Tea</title>

  <style>
    body {
      font-family: Arial;
      background: #f5fff2;
      margin: 0;
      padding: 30px;
      color: #2f4f2f;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-top: 30px;
    }

    .images {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .images img {
      width: 120px;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .images img:hover {
      transform: scale(1.05);
    }

    .main-image img {
      width: 350px;
      height: 500px;
      object-fit: cover;
      border-radius: 20px;
    }

    .text {
      max-width: 400px;
      font-size: 18px;
    }
    @media (max-width: 768px) {

  body {
    padding: 15px;
  }

  h1 {
    font-size: 24px;
  }

  .container {
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }

  .images {
    flex-direction: row;
    justify-content: center;
  }

  .images img {
    width: 70px;
    height: 90px;
  }

  .main-image img {
    width: 90vw;
    height: auto;
    max-height: 350px;
  }

  .text {
    font-size: 14px;
    text-align: center;
  }
}
  </style>

</head>
<body>

<h1>Focura Tea</h1>

<div class="container">

  <div class="images">
    <img src="tee5_bild1.png" onclick="changeImage(this)">
    <img src="tee5_bild2.png" onclick="changeImage(this)">
    <img src="tee5_bild3.png" onclick="changeImage(this)">
  </div>

  <div class="main-image">
    <img id="bigImage" src="tee5_bild1.png">
  </div>

  <div class="text">
    <p>
      Für deinen Fokus, dein Gedächtnis,deine Ziele!<br><br>
      Brennessel,Löwenzahn,Salbei,Kamille<br><br>
      Für durchbutung im Gehirn für meht konzentration uterstützt dein Gedächtnis<br><br>
      <b>Preis: 1.95Fr. pro 15g</b>
    </p>
  </div>

</div>

<script>
function changeImage(img) {
  document.getElementById("bigImage").src = img.src;
}
</script>

</body>
</html>
