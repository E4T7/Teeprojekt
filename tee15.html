<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tinorik</title>

  <style>
    body {
      font-family: Arial;
      background: #f5fff2;
      margin: 0;
      padding: 30px;
      color: #2f4f2f;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-top: 30px;
      align-items: flex-start;
    }

    .images {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .images img {
      width: 120px;
      height: 180px;
      object-fit: contain;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .images img:hover {
      transform: scale(1.05);
    }

    .main-image img {
      width: 350px;
      height: 500px;
      object-fit: contain;
      border-radius: 20px;
    }

    .text {
      max-width: 400px;
      font-size: 18px;
    }

    /* 📱 HANDY VERSION */
    @media (max-width: 768px) {

      body {
        padding: 15px;
      }

      h1 {
        font-size: 28px;
      }

      .container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .images {
        flex-direction: row;
        justify-content: center;
      }

      .images img {
        width: 90px;
        height: 120px;
      }

      .main-image img {
        width: 90vw;
        height: auto;
      }

      .text {
        text-align: center;
        font-size: 16px;
        max-width: 90vw;
      }
    }
  </style>
</head>

<body>

<h1>Tinorik</h1>

<div class="container">

  <div class="images">
    <img src="tee15_bild1.png" onclick="changeImage(this)">
    <img src="tee15_bild2.png" onclick="changeImage(this)">
    <img src="tee15_bild3.png" onclick="changeImage(this)">
  </div>

  <div class="main-image">
    <img id="bigImage" src="tee15_bild1.png">
  </div>

  <div class="text">
    <p>
      Gute Nacht beginnt in der Tasse<br><br>
      Kamille, Salbei, Holunder<br><br>
      Es ist ein Abendtee<br><br>
      <b>Preis: 10g für 1.20 Fr.</b>
    </p>
  </div>

</div>

<script>
function changeImage(img) {
  document.getElementById("bigImage").src = img.src;
}
</script>

</body>
</html>
