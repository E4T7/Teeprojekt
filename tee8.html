<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Der Tee von Morgen</title>

  <style>
    body {
      font-family: Arial;
      background: #f5fff2;
      margin: 0;
      padding: 30px;
      color: #2f4f2f;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-top: 30px;
    }

    .images {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .images img {
      width: 120px;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .images img:hover {
      transform: scale(1.05);
    }

    .main-image img {
      width: 350px;
      height: 500px;
      object-fit: cover;
      border-radius: 20px;
    }

    .text {
      max-width: 400px;
      font-size: 18px;
    }
  </style>

</head>
<body>

<h1>Der Tee von Morgen</h1>

<div class="container">

  <div class="images">
    <img src="tee8_bild1.png" onclick="changeImage(this)">
    <img src="tee8_bild2.png" onclick="changeImage(this)">
    <img src="tee8_bild3.png" onclick="changeImage(this)">
  </div>

  <div class="main-image">
    <img id="bigImage" src="tee8_bild1.png">
  </div>

  <div class="text">
    <p>
      Mit jeder Tasse ein Stück Wohlbefinden<br><br>
      Kamille,Brennessel,Gemeiner Löwenzahn,Enzianwurzel,<br><br>
      Der Tee von Morgen<br><br>
      <b>Preis:  2.50Fr. = 15g</b>
    </p>
  </div>

</div>

<script>
function changeImage(img) {
  document.getElementById("bigImage").src = img.src;
}
</script>

</body>
</html>
